<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BMMS Visual Editor</title>
  <link rel="stylesheet" href="/editor.css">
</head>
<body>
  <header class="editor-topbar">
    <a class="back" href="/">← BMMS Graphics</a>
    <input id="documentName" class="document-name" value="BMMS Visual Editor">
    <div class="top-actions">
      <span id="saveIndicator">Guardado</span>
      <button id="undo" title="Deshacer">↶</button>
      <button id="redo" title="Rehacer">↷</button>
      <button id="fitStage">Ajustar</button>
      <button id="saveDocument" class="primary">Guardar</button>
    </div>
  </header>

  <main class="editor-shell">
    <aside class="tools">
      <button id="selectTool" class="tool active" title="Selección">↖<span>Seleccionar</span></button>
      <button id="addText" class="tool" title="Texto">T<span>Texto</span></button>
      <button id="addShape" class="tool" title="Forma">▰<span>Forma</span></button>
    </aside>

    <aside class="layers-panel">
      <div class="panel-heading">
        <h2>Capas</h2>
        <span id="elementCount">0</span>
      </div>
      <div id="layers" class="layers"></div>
    </aside>

    <section class="canvas-area">
      <div class="canvas-toolbar">
        <span>1920 × 1080</span>
        <span id="zoomLabel">50%</span>
      </div>
      <div id="stageViewport" class="stage-viewport">
        <div id="stageScaler" class="stage-scaler">
          <div id="stage" class="stage"></div>
        </div>
      </div>
    </section>

    <aside class="properties">
      <div class="panel-heading">
        <h2>Propiedades</h2>
        <button id="deleteElement" class="danger" disabled>Eliminar</button>
      </div>

      <div id="emptyProperties" class="empty-state">
        Seleccione un elemento en el lienzo o en la lista de capas.
      </div>

      <div id="elementProperties" class="property-stack hidden">
        <label>Nombre<input id="propName"></label>
        <div class="grid four">
          <label>X<input id="propX" type="number"></label>
          <label>Y<input id="propY" type="number"></label>
          <label>W<input id="propWidth" type="number" min="1"></label>
          <label>H<input id="propHeight" type="number" min="1"></label>
        </div>
        <div class="grid two">
          <label>Rotación<input id="propRotation" type="number"></label>
          <label>Opacidad<input id="propOpacity" type="number" min="0" max="100"></label>
        </div>

        <section id="textProperties" class="type-properties hidden">
          <label>Texto<textarea id="propText" rows="5"></textarea></label>
          <div class="grid two">
            <label>Tipografía<input id="propFontFamily"></label>
            <label>Tamaño<input id="propFontSize" type="number" min="8"></label>
            <label>Peso
              <select id="propFontWeight">
                <option value="300">Light</option>
                <option value="400">Regular</option>
                <option value="600">Semibold</option>
                <option value="700">Bold</option>
                <option value="800">Extra Bold</option>
              </select>
            </label>
            <label>Alineación
              <select id="propAlign">
                <option value="left">Izquierda</option>
                <option value="center">Centro</option>
                <option value="right">Derecha</option>
              </select>
            </label>
            <label>Color<input id="propColor" type="color"></label>
            <label>Interlineado<input id="propLineHeight" type="number" step=".05" min=".5" max="3"></label>
          </div>
        </section>

        <section id="shapeProperties" class="type-properties hidden">
          <div class="grid two">
            <label>Relleno<input id="propFill" type="color"></label>
            <label>Radio<input id="propRadius" type="number" min="0"></label>
          </div>
        </section>

        <div class="layer-actions">
          <button id="sendBackward">Enviar atrás</button>
          <button id="bringForward">Traer adelante</button>
        </div>
      </div>

      <details class="document-properties">
        <summary>Documento</summary>
        <label>Fondo<input id="documentBackground" type="color"></label>
      </details>
    </aside>
  </main>

  <script type="module" src="/editor.js"></script>
</body>
</html>
