<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BMMS Visual Editor</title><link rel="stylesheet" href="/editor.css"></head><body>
<header class="editor-topbar"><a class="back" href="/">← BMMS Graphics</a><input id="documentName" class="document-name"><div class="top-actions"><span id="saveIndicator">Guardado</span><button id="undo">↶</button><button id="redo">↷</button><select id="zoomSelect"><option value="fit">Ajustar</option><option value=".25">25%</option><option value=".5">50%</option><option value=".75">75%</option><option value="1">100%</option><option value="1.5">150%</option><option value="2">200%</option></select><button id="saveDocument" class="primary">Guardar</button></div></header>
<main class="editor-shell"><aside class="tools"><button class="tool active">↖<span>Seleccionar</span></button><button id="addText" class="tool">T<span>Texto</span></button><button id="addShape" class="tool">▰<span>Forma</span></button></aside>
<aside class="layers-panel"><div class="panel-heading"><h2>Capas</h2><span id="elementCount">0</span></div><div id="layers" class="layers"></div></aside>
<section class="canvas-area"><div class="canvas-toolbar"><span>1920 × 1080</span><div class="canvas-options"><label><input id="toggleSafe" type="checkbox"> Área segura</label><label><input id="toggleGrid" type="checkbox" checked> Cuadrícula</label><span id="zoomLabel">50%</span></div></div><div id="stageViewport" class="stage-viewport"><div id="stageScaler" class="stage-scaler"><div id="stage" class="stage"><div id="safeArea" class="safe-area hidden"><div class="action-safe"></div><div class="title-safe"></div></div><div id="guideX" class="smart-guide vertical hidden"></div><div id="guideY" class="smart-guide horizontal hidden"></div></div></div></div></section>
<aside class="properties"><div class="panel-heading"><h2>Propiedades</h2><button id="deleteElement" class="danger" disabled>Eliminar</button></div><div id="emptyProperties" class="empty-state">Seleccione un elemento.</div><div id="elementProperties" class="property-stack hidden">
<details open><summary>Transformación</summary><div class="section-body"><label>Nombre<input id="propName"></label><div class="grid four"><label>X<input id="propX" type="number"></label><label>Y<input id="propY" type="number"></label><label>W<input id="propWidth" type="number"></label><label>H<input id="propHeight" type="number"></label></div><div class="grid two"><label>Rotación<input id="propRotation" type="number"></label><label>Opacidad<input id="propOpacity" type="number" min="0" max="100"></label></div></div></details>
<details id="textProperties"><summary>Texto</summary><div class="section-body"><label>Contenido<textarea id="propText" rows="4"></textarea></label><div class="grid two"><label>Tipografía<input id="propFontFamily"></label><label>Tamaño<input id="propFontSize" type="number"></label><label>Peso<select id="propFontWeight"><option>300</option><option>400</option><option>600</option><option>700</option><option>800</option></select></label><label>Alineación<select id="propAlign"><option value="left">Izquierda</option><option value="center">Centro</option><option value="right">Derecha</option></select></label><label>Color<input id="propColor" type="color"></label><label>Interlineado<input id="propLineHeight" type="number" step=".05"></label></div></div></details>
<details id="shapeProperties"><summary>Apariencia</summary><div class="section-body grid two"><label>Relleno<input id="propFill" type="color"></label><label>Radio<input id="propRadius" type="number"></label></div></details>
<details open><summary>Capas</summary><div class="section-body layer-actions"><button id="sendBackward">Enviar atrás</button><button id="bringForward">Traer adelante</button></div></details></div>
<details class="document-properties"><summary>Documento</summary><div class="section-body"><label>Fondo<input id="documentBackground" type="color"></label></div></details></aside></main><script type="module" src="/editor.js"></script></body></html>
